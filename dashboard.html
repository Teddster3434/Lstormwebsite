<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Center Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0a0f1c;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    background: #02050a;
    border-right: 1px solid #d4a63a;
    position: fixed;
    left: 0;
    top: 0;
    padding-top: 20px;
    transition: transform 0.3s ease;
}

.sidebar.hidden {
    transform: translateX(-100%);
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

/* GOLD SLIDER */
.slider {
    position: absolute;
    width: 4px;
    height: 50px;
    background: #d4a63a;
    left: 0;
    top: 80px;
    transition: top 0.3s ease;
}

/* BUTTONS */
.nav-btn {
    width: 100%;
    padding: 15px;
    background: none;
    border: none;
    color: white;
    text-align: left;
    cursor: pointer;
    font-size: 15px;
}

.nav-btn:hover {
    background: rgba(212,166,58,0.2);
}

/* MAIN */
.main {
    margin-left: 250px;
    padding: 30px;
    width: 100%;
    transition: margin-left 0.3s ease;
}

.main.full {
    margin-left: 0;
}

/* TOP BAR */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.menu-btn {
    font-size: 24px;
    cursor: pointer;
}

/* LOGOUT */
.logout {
    background: #d4a63a;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

/* SECTIONS */
.section {
    display: none;
    margin-top: 30px;
}

.section.active {
    display: block;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #d4a63a;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="slider" id="slider"></div>

    <h2>Storm</h2>

    <button class="nav-btn" onclick="showSection('home', this)">🏠 Home</button>
    <button class="nav-btn" onclick="showSection('account', this)">👤 Account</button>
    <button class="nav-btn" onclick="showSection('security', this)">🔐 Security Centre</button>
    <button class="nav-btn" onclick="showSection('info', this)">📄 My Information</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="topbar">
    <div class="left">
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <h1 id="welcome">Welcome</h1>
    </div>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <div class="card">
        <h2>Dashboard</h2>
        <p id="helloText">Loading...</p>
    </div>
</div>

<!-- ACCOUNT -->
<div id="account" class="section">
    <div class="card">
        <h2>Account</h2>
        <p>Email: <span id="userEmail"></span></p>
    </div>
</div>

<!-- SECURITY -->
<div id="security" class="section">
    <div class="card">
        <h2>Security Centre</h2>
        <p>2FA options coming soon.</p>
    </div>
</div>

<!-- INFO -->
<div id="info" class="section">
    <div class="card">
        <h2>My Information</h2>
        <p>Name: <span id="userName"></span></p>
    </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGkGnNraXonGNCMH0kQH0HcdgVQeDDqjI",
  authDomain: "storm-center-5f5fd.firebaseapp.com",
  projectId: "storm-center-5f5fd",
  storageBucket: "storm-center-5f5fd.firebasestorage.app",
  messagingSenderId: "371213361425",
  appId: "1:371213361425:web:089e296a06e7aef929acb0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH CHECK
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("userEmail").innerText = user.email;

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
        const data = docSnap.data();

        document.getElementById("userName").innerText = data.name;
        document.getElementById("welcome").innerText = "Hello, " + data.name;
        document.getElementById("helloText").innerText = "What's up " + data.name + "? ⚡";
    }
});

// LOGOUT
window.logout = function() {
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
};

// MENU TOGGLE
window.toggleMenu = function() {
    document.getElementById("sidebar").classList.toggle("hidden");
    document.getElementById("main").classList.toggle("full");
};

// SECTION SWITCH + SLIDER
window.showSection = function(id, el) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    const slider = document.getElementById("slider");
    slider.style.top = el.offsetTop + "px";
};
</script>

</body>
</html>
