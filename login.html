<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Center Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(circle at center, #0a0f1c, #02050a);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        position: relative;
        width: 350px;
        padding: 40px 30px;
        border: 1px solid #d4a63a;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        text-align: center;
        overflow: hidden;
    }

    /* Background hat */
    .container::before {
        content: "";
        position: absolute;
        top: -50px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 220px;
        background: url('Hat.png') no-repeat center;
        background-size: contain;
        opacity: 0.15;
        z-index: 0;
    }

    .content {
        position: relative;
        z-index: 1;
    }

    h1 {
        letter-spacing: 5px;
        font-size: 22px;
        margin-bottom: 25px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #0b0f18;
        color: white;
        outline: none;
    }

    input:focus {
        border-color: #d4a63a;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        letter-spacing: 1px;
        margin-top: 10px;
    }

    .login-btn {
        background: linear-gradient(90deg, #d4a63a, #f0c35a);
        color: black;
    }

    .login-btn:hover {
        opacity: 0.9;
    }

    .create-btn {
        background: transparent;
        border: 1px solid #d4a63a;
        color: #d4a63a;
    }

    .create-btn:hover {
        background: #d4a63a;
        color: black;
    }
</style>

</head>
<body>

<div class="container">
    <div class="content">
        <h1>STORM CENTER</h1>

        <div class="input-group">
            <input type="email" placeholder="Email" id="email">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" id="password">
        </div>

        <button class="btn login-btn">LOGIN</button>
        <button class="btn create-btn">CREATE ACCOUNT</button>
    </div>
</div>

</body>
</html>
