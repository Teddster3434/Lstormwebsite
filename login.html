<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Storm Center</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0a0f1c, #02050a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    width: 350px;
    padding: 30px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #d4a63a;
    border-radius: 10px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #0b0f18;
    border: 1px solid #444;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #d4a63a;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#message { margin-top: 15px; }
.success { color: #4caf50; }
.error { color: #ff4d4d; }
</style>
</head>

<body>

<div class="container">

<h2>Storm Center</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="goSignup()" style="cursor:pointer;color:#d4a63a;">
Create an account
</p>

<div id="message"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "storm-center-5f5fd.firebaseapp.com",
  projectId: "storm-center-5f5fd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function msg(text, type) {
    const el = document.getElementById("message");
    el.className = type;
    el.innerText = text;
}

window.login = function() {
    const email = email.value;
    const password = password.value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        msg("Welcome back ⚡", "success");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 800);
    })
    .catch(err => msg(err.message, "error"));
};

window.goSignup = () => window.location.href = "accountcreation.html";
</script>

</body>
</html>
