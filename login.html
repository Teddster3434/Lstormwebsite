<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Center Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0a0f1c, #02050a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    position: relative;
    width: 360px;
    padding: 50px 30px;
    border: 1px solid #d4a63a;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    text-align: center;
    overflow: hidden;
    height: 480px;
}

/* Hat background */
.container::before {
    content: "";
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 240px;
    background: url('Hat.png') no-repeat center;
    background-size: contain;
    opacity: 0.18;
    z-index: 0;
}

.content {
    position: relative;
    z-index: 1;
    margin-top: 140px;
}

h1 {
    letter-spacing: 5px;
    font-size: 24px;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    border: 1px solid #444;
    background: #0b0f18;
    color: white;
    outline: none;
}

input:focus {
    border-color: #d4a63a;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
    margin-top: 10px;
    border: none;
}

.login-btn {
    background: linear-gradient(90deg, #d4a63a, #f0c35a);
    color: black;
}

.create-btn {
    background: transparent;
    border: 1px solid #d4a63a;
    color: #d4a63a;
}

.create-btn:hover {
    background: #d4a63a;
    color: black;
}
</style>

</head>
<body>

<div class="container">
    <div class="content">
        <h1>STORM CENTER</h1>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button class="btn login-btn">LOGIN</button>
        <button class="btn create-btn">CREATE ACCOUNT</button>
    </div>
</div>

<!-- ✅ FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAPJQWcG8s94SLzBsqqCc90c_qLkDK0UGc",
  authDomain: "storm-site-login.firebaseapp.com",
  projectId: "storm-site-login",
  storageBucket: "storm-site-login.firebasestorage.app",
  messagingSenderId: "1047191602667",
  appId: "1:1047191602667:web:002ab34b02ab84674185ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
document.querySelector(".login-btn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Logged in!");
    })
    .catch((error) => {
        alert(error.message);
    });
});

// CREATE ACCOUNT
document.querySelector(".create-btn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Account created!");
    })
    .catch((error) => {
        alert(error.message);
    });
});
</script>

</body>
</html>
</body>
</html>
