<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Center - Create Account</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0a0f1c, #02050a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 350px;
    padding: 40px 30px;
    border: 1px solid #d4a63a;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    text-align: center;
}

h1 {
    letter-spacing: 3px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #444;
    background: #0b0f18;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #d4a63a, #f0c35a);
}

#message {
    margin-top: 15px;
    font-weight: bold;
}

.success {
    color: #4caf50;
}

.error {
    color: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">

<h1>STORM CENTER</h1>

<!-- STEP 1 -->
<div id="step1">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">CREATE ACCOUNT</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
    <p>You know my name… now what’s your name?</p>
    <input type="text" id="name" placeholder="Your Name">
    <button onclick="saveName()">FINISH</button>
</div>

<div id="message"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGkGnNraXonGNCMH0kQH0HcdgVQeDDqjI",
  authDomain: "storm-center-5f5fd.firebaseapp.com",
  projectId: "storm-center-5f5fd",
  storageBucket: "storm-center-5f5fd.firebasestorage.app",
  messagingSenderId: "371213361425",
  appId: "1:371213361425:web:089e296a06e7aef929acb0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

function showMessage(text, type) {
    const msg = document.getElementById("message");
    msg.className = type;
    msg.innerText = text;
}

// STEP 1 SIGNUP
window.signup = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
        currentUser = userCredential.user;

        showMessage("Nice one ⚡ account created!", "success");

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    })
    .catch((error) => {
        showMessage(error.message, "error");
    });
};

// STEP 2 SAVE NAME
window.saveName = function() {
    const name = document.getElementById("name").value;

    if (!name) {
        showMessage("Oi, we need your name 😄", "error");
        return;
    }

    setDoc(doc(db, "users", currentUser.uid), {
        email: currentUser.email,
        name: name
    })
    .then(() => {
        showMessage("All set 🎉 Welcome aboard!", "success");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1500);
    })
    .catch((error) => {
        showMessage(error.message, "error");
    });
};
</script>

</body>
</html>
