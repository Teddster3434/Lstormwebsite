<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Storm Center</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0a0f1c, #02050a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    position: relative;
    width: 360px;
    padding: 50px 30px;
    border: 1px solid #d4a63a;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(10px);
    text-align: center;
    height: 520px;
}

.container::before {
    content: "";
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 240px;
    background: url('Hat.png') no-repeat center;
    background-size: contain;
    opacity: 0.15;
}

.content {
    position: relative;
    margin-top: 130px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 5px;
    border: 1px solid #444;
    background: #0b0f18;
    color: white;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

.create-btn {
    background: linear-gradient(90deg, #d4a63a, #f0c35a);
    color: black;
}

.link {
    margin-top: 15px;
    display: block;
    color: #d4a63a;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="content">

<h2>CREATE ACCOUNT</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<button class="btn create-btn">CREATE ACCOUNT</button>

<span class="link" onclick="window.location.href='login.html'">
Back to Login
</span>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY_HERE",
  authDomain: "storm-site-login.firebaseapp.com",
  projectId: "storm-site-login",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.querySelector(".create-btn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) return alert("Passwords don't match");
    if (password.length < 6) return alert("Password must be at least 6 characters");

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Account created!");
        window.location.href = "login.html";
    })
    .catch(err => alert(err.message));
});
</script>

</body>
</html>
